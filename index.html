<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Workout Counter (Beep + Dropbox Audio)</title>
<style>
  :root{
    --primary:#2563eb;
    --danger:#dc2626;
    --gray:#6b7280;
    --bg:#f3f4f6;
  }
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;}
  body{
    margin:0;background:var(--bg);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .wrap{width:100%;max-width:440px;}
  .card{
    background:#fff;border-radius:18px;padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.10);
  }
  h1{margin:0 0 14px;text-align:center;font-size:22px;}
  label{display:block;margin:14px 0 6px;font-size:13px;color:#111827;}
  select,input[type="range"]{
    width:100%;border:0;border-radius:14px;background:#f1f5f9;
    padding:12px;font-size:16px;
  }
  input[type="range"]{padding:14px 10px;}
  .value{margin-top:6px;font-size:13px;color:#374151;text-align:right;}
  .status{
    margin-top:14px;
    text-align:center;
    color:#6b7280;
    font-size:14px;
    min-height:18px;
  }
  .btnRow{display:flex;gap:10px;margin-top:14px;}
  button{
    flex:1;border:0;border-radius:14px;
    padding:14px;font-size:18px;font-weight:700;cursor:pointer;
    user-select:none;-webkit-tap-highlight-color:transparent;
  }
  .start{background:var(--primary);color:#fff;}
  .pause{background:var(--gray);color:#fff;}
  .reset{background:var(--danger);color:#fff;}
  .hint{margin-top:12px;font-size:12px;color:#6b7280;line-height:1.35;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Workout Counter</h1>

      <label>Target count</label>
      <select id="target">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="75" selected>75</option>
        <option value="100">100</option>
      </select>

      <label>Counting speed</label>
      <input type="range" id="speed" min="0.6" max="1.6" step="0.05" value="1.0" />
      <div class="value" id="speedVal">1.00×</div>

      <label>Counting audio volume</label>
      <input type="range" id="countVol" min="0" max="1" step="0.01" value="1" />
      <div class="value" id="countVolVal">1.00</div>

      <div class="status" id="status">Ready</div>

      <div class="btnRow">
        <button class="start" id="startBtn">Start</button>
        <button class="pause" id="pauseBtn">Pause</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>

      <div class="hint">
        Play Apple Music on your phone, then tap <b>Start</b> here. This app uses beeps + your recorded counting audio (no speech synthesis).
      </div>
    </div>
  </div>

<script>
(() => {
  // --- Your Dropbox shared links ---
  const DROPBOX = {
    25: "https://www.dropbox.com/scl/fi/4jt269camde65gte0rje5/counting_25.mp3?rlkey=9zqfepkg5gdsvk9a9vniwovaj&st=evre2gl9&dl=0",
    50: "https://www.dropbox.com/scl/fi/leezlfdnjj9iwcr8txt4a/counting_50.mp3?rlkey=r0tzoety5ide84grj6v7akvmq&st=cxbwix6z&dl=0",
    75: "https://www.dropbox.com/scl/fi/2ddnreo5wwtm355afkll3/counting_75.mp3?rlkey=bvjkzzpccfy3091z2ls99mjgl&st=scq4wefb&dl=0",
    100:"https://www.dropbox.com/scl/fi/2gfg5web0fxh9f8qybieh/counting_100.mp3?rlkey=310iiltw1fu666lyy6p35f1es&st=rb7rszor&dl=0",
  };

  // Force direct download parameter (more reliable for media fetching)
  function forceDl1(url){
    const u = new URL(url);
    u.searchParams.set("dl", "1");
    return u.toString();
  }

  // --- UI ---
  const elTarget   = document.getElementById("target");
  const elSpeed    = document.getElementById("speed");
  const elSpeedVal = document.getElementById("speedVal");

  const elCountVol    = document.getElementById("countVol");
  const elCountVolVal = document.getElementById("countVolVal");

  const elStatus  = document.getElementById("status");
  const startBtn  = document.getElementById("startBtn");
  const pauseBtn  = document.getElementById("pauseBtn");
  const resetBtn  = document.getElementById("resetBtn");

  function setStatus(t){ elStatus.textContent = t; }

  // --- Audio (WebAudio) ---
  let ctx = null;
  let masterGain = null;

  // Counting playback state
  let countBuffer = null;
  let source = null;
  let startedAt = 0;     // ctx.currentTime when started
  let pausedAt = 0;      // seconds into buffer
  let isLoaded = false;

  function ensureCtx(){
    if (!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = Number(elCountVol.value);
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === "suspended") return ctx.resume();
    return Promise.resolve();
  }

  async function loadCountBuffer(target){
    await ensureCtx();
    setStatus("Loading audio…");

    const url = forceDl1(DROPBOX[target]);
    const res = await fetch(url, { mode: "cors", redirect: "follow" });
    if (!res.ok) throw new Error("Audio fetch failed: " + res.status);

    const arrayBuf = await res.arrayBuffer();
    countBuffer = await ctx.decodeAudioData(arrayBuf);
    isLoaded = true;
    pausedAt = 0;
    setStatus("Ready");
  }

  function stopSource(){
    if (source){
      try { source.stop(0); } catch(e) {}
      try { source.disconnect(); } catch(e) {}
      source = null;
    }
  }

  function playFrom(offsetSec){
    stopSource();
    source = ctx.createBufferSource();
    source.buffer = countBuffer;
    source.playbackRate.value = Number(elSpeed.value);
    source.connect(masterGain);

    startedAt = ctx.currentTime - offsetSec;
    source.start(0, offsetSec);

    source.onended = () => {
      // If it naturally ended (not a pause/reset)
      if (source) {
        source = null;
        pausedAt = 0;
        setStatus("Done ✅");
      }
    };
  }

  function currentOffset(){
    // How far into the buffer we are, accounting for playbackRate
    const rate = Number(elSpeed.value);
    const t = (ctx.currentTime - startedAt) * rate;
    return Math.max(0, Math.min(t, countBuffer ? countBuffer.duration : 0));
  }

  // --- Beeps (3-second countdown) ---
  async function beepOnce(durationMs = 140, freq = 880){
    await ensureCtx();

    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + durationMs/1000);

    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + durationMs/1000);

    await new Promise(r => osc.onended = r);
  }

  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  async function beepCountdown3PlusPause(){
    setStatus("Get ready…");
    // 3 beeps ~1 second apart
    for (let i=0; i<3; i++){
      await beepOnce(140, 880);
      await wait(860);
    }
    // extra 1-second pause after the 3 beeps
    setStatus("…");
    await wait(1000);
  }

  // --- Wake lock (optional) ---
  let wakeLock = null;
  async function requestWakeLock(){
    try{
      if ("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
      }
    }catch(e){}
  }
  async function releaseWakeLock(){
    try{ if (wakeLock) await wakeLock.release(); }catch(e){}
    wakeLock = null;
  }

  // --- Controls ---
  elSpeed.addEventListener("input", () => {
    elSpeedVal.textContent = Number(elSpeed.value).toFixed(2) + "×";
    // If currently playing, update playbackRate live
    if (source) source.playbackRate.value = Number(elSpeed.value);
  });

  elCountVol.addEventListener("input", () => {
    const v = Number(elCountVol.value);
    elCountVolVal.textContent = v.toFixed(2);
    if (masterGain) masterGain.gain.value = v;
  });

  elTarget.addEventListener("change", async () => {
    // Changing target resets the session
    reset();
    try{
      await loadCountBuffer(Number(elTarget.value));
    }catch(e){
      setStatus("Couldn’t load audio (Dropbox/CORS).");
      console.error(e);
    }
  });

  async function start(){
    try{
      await ensureCtx();

      // load if needed
      if (!isLoaded){
        await loadCountBuffer(Number(elTarget.value));
      }

      // Resume from pause if pausedAt > 0
      if (pausedAt > 0){
        setStatus("Counting…");
        await requestWakeLock();
        playFrom(pausedAt);
        return;
      }

      // Fresh start: countdown beeps then play from 0
      stopSource();
      pausedAt = 0;

      await beepCountdown3PlusPause();

      setStatus("Counting…");
      await requestWakeLock();
      playFrom(0);

    }catch(e){
      console.error(e);
      setStatus("Start failed. Check Dropbox link access.");
    }
  }

  function pause(){
    if (!ctx || !countBuffer) return;
    if (!source) return; // already paused/stopped

    pausedAt = currentOffset();
    stopSource();
    releaseWakeLock();
    setStatus("Paused");
  }

  function reset(){
    stopSource();
    pausedAt = 0;
    releaseWakeLock();
    setStatus("Ready");
  }

  startBtn.addEventListener("click", start);
  pauseBtn.addEventListener("click", pause);
  resetBtn.addEventListener("click", reset);

  // Init UI text
  elSpeedVal.textContent = Number(elSpeed.value).toFixed(2) + "×";
  elCountVolVal.textContent = Number(elCountVol.value).toFixed(2);

  // Preload initial target (optional; keeps first Start snappy)
  // Comment out if you prefer it to load only when Start is tapped.
  loadCountBuffer(Number(elTarget.value)).catch(e => {
    console.error(e);
    setStatus("Ready (audio will load on Start)");
    isLoaded = false;
  });
})();
</script>
</body>
</html>
