<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Workout Counter</title>
<style>
  :root{--primary:#2563eb;--danger:#dc2626;--gray:#6b7280;--bg:#f3f4f6;}
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;}
  body{margin:0;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .wrap{width:100%;max-width:440px;}
  .card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.10);}
  h1{margin:0 0 20px;text-align:center;font-size:2em;}
  label{display:block;margin:14px 0 6px;font-size:16px;color:#111827;}
  select,input[type="range"]{width:100%;border:0;border-radius:14px;background:#f1f5f9;padding:16px;font-size:18px;}
  input[type="range"]{padding:14px 10px;}
  .value{margin-top:6px;font-size:14px;font-weight:bold;color:#374151;text-align:right;}
  .status{margin-top:14px;text-align:center;color:#6b7280;font-size:14px;min-height:18px;}
  .btnRow{display:flex;flex-direction: column;gap:10px;margin-top:14px;}
  button{flex:1;border:0;border-radius:16px;box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);padding:14px;font-size:18px;font-weight:700;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
  .start{background:var(--primary);color:#fff;}
  .pause{background:var(--danger);color:#fff;}
  .reset{background:var(--gray);color:#fff;}
  .hint{margin-top:12px;font-size:12px;color:#6b7280;line-height:1.35;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Workout Counter</h1>

      <label>Target Count</label>
      <select id="target">
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>

      <label>Counting Speed</label>
      <input type="range" id="speed" min="0.6" max="1.6" step="0.05" value="1.0" />
      <div class="value" id="speedVal">1.00×</div>

      <label>Counting Audio Volume</label>
      <input type="range" id="countVol" min="0" max="1" step="0.01" value="1" />
      <div class="value" id="countVolVal">1.00</div>
      <audio id="countEl" playsinline preload="auto"></audio>
      <div class="status" id="status">Ready</div>

      <div class="btnRow">
        <button class="start" id="startBtn">Start</button>
        <button class="pause" id="pauseBtn">Pause</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>

      <div class="hint">
        Start Apple Music/Spotify first, then tap <b>Start</b>. This app uses recorded counting audio (no speech synthesis).
      </div>
    </div>
  </div>

<script>
(() => {
  // MP3s must be in the SAME GitHub Pages folder as index.html
  const AUDIO = {
    25: "c_25.mp3",
    50: "c_50.mp3",
    75: "c_75.mp3",
    100:"c_100.mp3",
  };

  const elTarget   = document.getElementById("target");
  const elSpeed    = document.getElementById("speed");
  const elSpeedVal = document.getElementById("speedVal");
  const elCountVol = document.getElementById("countVol");
  const elCountVolVal = document.getElementById("countVolVal");
  const elStatus   = document.getElementById("status");
  const startBtn   = document.getElementById("startBtn");
  const pauseBtn   = document.getElementById("pauseBtn");
  const resetBtn   = document.getElementById("resetBtn");

  // Your counting audio element (HTMLAudioElement)
  const countEl = document.getElementById("countEl");

  const setStatus = (t) => (elStatus.textContent = t);

  // WebAudio ONLY for beeps
  let ctx = null;

  // wake lock (optional)
  let wakeLock = null;

  function playbackRate() {
    return Number(elSpeed.value);
  }

  function applyCountSettings() {
    countEl.volume = Number(elCountVol.value);
    countEl.playbackRate = playbackRate();
  }

  function ensureCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") return ctx.resume();
    return Promise.resolve();
  }

  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
    } catch (e) {}
  }

  async function releaseWakeLock() {
    try { if (wakeLock) await wakeLock.release(); } catch (e) {}
    wakeLock = null;
  }

  // ---- Beep countdown: 3 beeps + extra 1 second pause ----
  const wait = (ms) => new Promise((r) => setTimeout(r, ms));

  async function beepOnce(durationMs = 140, freq = 880) {
    await ensureCtx();
    const t0 = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + durationMs / 1000);

    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + durationMs / 1000);

    await new Promise((r) => (osc.onended = r));
  }

  async function countdown3BeepPlus1s() {
    setStatus("Get ready…");
    for (let i = 0; i < 3; i++) {
      await beepOnce(140, 880);
      await wait(860); // ~1 second spacing
    }
    setStatus("…");
    await wait(1000); // extra 1 sec pause
  }

  // ---- Counting audio loading (HTMLAudioElement) ----
  let loadedTarget = null;

  async function loadForSelectedTarget() {
    const t = Number(elTarget.value);
    if (loadedTarget === t && countEl.src) return;

    setStatus("Loading audio…");

    // Cache-bust is important for iPhone after renames/deploys
    const url = AUDIO[t] + "?v=" + Date.now();
    countEl.src = url;
    countEl.load();

    applyCountSettings();

    await new Promise((resolve, reject) => {
      const onCanPlay = () => { cleanup(); resolve(); };
      const onErr = () => {
        cleanup();
        reject(new Error("Audio failed to load: " + url));
      };

      function cleanup() {
        countEl.removeEventListener("canplaythrough", onCanPlay);
        countEl.removeEventListener("error", onErr);
      }

      countEl.addEventListener("canplaythrough", onCanPlay);
      countEl.addEventListener("error", onErr);
    });

    loadedTarget = t;
    setStatus("Ready");
  }

  // ---- Controls ----
  async function start() {
    try {
      // Ensure beep audio works on iOS (must happen within user gesture)
      await ensureCtx();

      // Load counting file (HTMLAudioElement)
      await loadForSelectedTarget();

      // Resume if paused mid-track
      if (countEl.currentTime > 0 && countEl.paused && !countEl.ended) {
        setStatus("Counting…");
        await requestWakeLock();
        applyCountSettings();
        await countEl.play();
        return;
      }

      // Fresh start
      countEl.pause();
      countEl.currentTime = 0;

      await countdown3BeepPlus1s();

      setStatus("Counting…");
      await requestWakeLock();
      applyCountSettings();
      await countEl.play();

    } catch (e) {
      console.error(e);
      setStatus(e.message || "Couldn't start.");
    }
  }

  function pause() {
    if (!countEl.paused) countEl.pause();
    releaseWakeLock();
    setStatus("Paused");
  }

  function reset() {
    countEl.pause();
    countEl.currentTime = 0;
    releaseWakeLock();
    setStatus("Ready");
  }

  // ---- UI bindings ----
  elSpeed.addEventListener("input", () => {
    elSpeedVal.textContent = playbackRate().toFixed(2) + "×";
    countEl.playbackRate = playbackRate();
  });

  elCountVol.addEventListener("input", () => {
    const v = Number(elCountVol.value);
    elCountVolVal.textContent = v.toFixed(2);
    countEl.volume = v;
  });

  elTarget.addEventListener("change", async () => {
    reset();
    loadedTarget = null;
    try {
      await loadForSelectedTarget();
    } catch (e) {
      console.error(e);
      setStatus(e.message || "Couldn’t load audio.");
    }
  });

  startBtn.addEventListener("click", start);
  pauseBtn.addEventListener("click", pause);
  resetBtn.addEventListener("click", reset);

  countEl.addEventListener("ended", () => {
    releaseWakeLock();
    setStatus("Done ✅");
  });

  // ---- init ----
  elSpeedVal.textContent = playbackRate().toFixed(2) + "×";
  elCountVolVal.textContent = Number(elCountVol.value).toFixed(2);
  applyCountSettings();

  // Optional preload (safe)
  loadForSelectedTarget().catch(() => setStatus("Ready (loads on Start)"));
})();
</script>
</body>
</html>
