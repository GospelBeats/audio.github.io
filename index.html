<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Workout Counter</title>
<style>
  :root{--primary:#2563eb;--danger:#dc2626;--gray:#6b7280;--bg:#f3f4f6;}
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;}
  body{margin:0;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .wrap{width:100%;max-width:440px;}
  .card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.10);}
  h1{margin:0 0 20px;text-align:center;font-size:2em;}
  label{display:block;margin:14px 0 6px;font-size:16px;color:#111827;}
  select,input[type="range"]{width:100%;border:0;border-radius:14px;background:#f1f5f9;padding:16px;font-size:18px;}
  input[type="range"]{padding:14px 10px;}
  .value{margin-top:6px;font-size:14px;font-weight:bold;color:#374151;text-align:right;}
  .status{margin-top:14px;text-align:center;color:#6b7280;font-size:14px;min-height:18px;}
  .btnRow{display:flex;flex-direction: column;gap:10px;margin-top:14px;}
  button{flex:1;border:0;border-radius:16px;box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);padding:14px;font-size:18px;font-weight:700;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
  .start{background:var(--primary);color:#fff;}
  .pause{background:var(--danger);color:#fff;}
  .reset{background:var(--gray);color:#fff;}
  .hint{margin-top:12px;font-size:12px;color:#6b7280;line-height:1.35;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Workout Counter</h1>

      <label>Target Count</label>
      <select id="target">
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>

      <label>Counting Speed</label>
      <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0" />
      <div class="value" id="speedVal">1.00×</div>

      <label>Counting Audio Volume</label>
      <input type="range" id="countVol" min="0" max="1" step="0.01" value="1" />
      <div class="value" id="countVolVal">1.00</div>
      
      <div class="status" id="status">Ready</div>

      <div class="btnRow">
        <button class="start" id="startBtn">Start</button>
        <button class="pause" id="pauseBtn">Pause</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>

      <div class="hint">
        Start Apple Music/Spotify first, then tap <b>Start</b>. This app uses recorded counting audio (no speech synthesis).
      </div>
    </div>
  </div>

<script>
(() => {
  const elTarget   = document.getElementById("target");
  const elSpeed    = document.getElementById("speed");
  const elSpeedVal = document.getElementById("speedVal");
  const elCountVol = document.getElementById("countVol");
  const elCountVolVal = document.getElementById("countVolVal");
  const elStatus   = document.getElementById("status");
  const startBtn   = document.getElementById("startBtn");
  const pauseBtn   = document.getElementById("pauseBtn");
  const resetBtn   = document.getElementById("resetBtn");

  const setStatus = (t) => (elStatus.textContent = t);

  // --- WebAudio for beeps (lightweight; best chance to keep Apple Music playing) ---
  let ctx = null;
  let beepGain = null;

  // Timer state
  let timer = null;
  let current = 0;
  let target = Number(elTarget.value);
  let paused = false;
  let inCountdown = false;

  // Optional wake lock
  let wakeLock = null;

  function ensureCtx(){
    if (!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      beepGain = ctx.createGain();
      beepGain.connect(ctx.destination);
    }
    // keep gain in sync
    beepGain.gain.value = Number(elCountVol.value);
    if (ctx.state === "suspended") return ctx.resume();
    return Promise.resolve();
  }

  async function requestWakeLock(){
    try{
      if ("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
      }
    }catch(e){}
  }
  async function releaseWakeLock(){
    try{ if (wakeLock) await wakeLock.release(); }catch(e){}
    wakeLock = null;
  }

  function secondsPerCount(){
    const speed = Number(elSpeed.value);
    const baseTempo = 1.0; // 1 second per count at 1×
    return baseTempo / speed;
  }

  function vibrate(pattern){
    // iOS Safari generally does NOT vibrate; Android usually does.
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function beepOnce({durationMs=90, freq=880, volume=1} = {}){
    // volume here scales the beep envelope; master volume comes from slider via beepGain.gain
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    const peak = 0.22 * volume;

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durationMs/1000);

    osc.connect(g).connect(beepGain);
    osc.start(t0);
    osc.stop(t0 + durationMs/1000);

    return new Promise(r => osc.onended = r);
  }

  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  // 3 beeps + 1 second pause (your requirement)
  async function countdown3BeepPlus1s(){
    inCountdown = true;
    setStatus("Get ready…");
    for (let i=0; i<3; i++){
      await beepOnce({durationMs:120, freq:880, volume:1});
      vibrate([30]);
      await wait(880);
    }
    setStatus("…");
    await wait(1000);
    inCountdown = false;
  }

  // Cue patterns:
  // - "Go": single higher beep
  // - "Halfway": double beep
  // - "Done": triple beep (descending)
  async function cueGo(){
    await beepOnce({durationMs:120, freq:1040, volume:1});
    vibrate([40]);
  }
  async function cueHalfway(){
    await beepOnce({durationMs:90, freq:880, volume:1});
    await wait(140);
    await beepOnce({durationMs:90, freq:880, volume:1});
    vibrate([30, 70, 30]);
  }
  async function cueDone(){
    await beepOnce({durationMs:120, freq:880, volume:1});
    await wait(120);
    await beepOnce({durationMs:120, freq:740, volume:1});
    await wait(120);
    await beepOnce({durationMs:140, freq:660, volume:1});
    vibrate([60, 80, 60]);
  }

  function clearTimer(){
    if (timer) clearTimeout(timer);
    timer = null;
  }

  async function tick(){
    if (paused) return;

    current += 1;

    // Main count beep (short “tick”)
    // Slightly lower pitch so cues stand out
    await beepOnce({durationMs:70, freq:760, volume:0.9});
    vibrate([15]);

    // Milestones
    const halfway = Math.ceil(target / 2);
    if (current === halfway && target >= 4){
      await cueHalfway();
    }

    if (current >= target){
      setStatus("Done ✅");
      await cueDone();
      clearTimer();
      await releaseWakeLock();
      return;
    }

    // Schedule next
    timer = setTimeout(tick, secondsPerCount() * 1000);
  }

  async function start(){
    try{
      await ensureCtx(); // must be within a user tap on iPhone
      target = Number(elTarget.value);
      if (!target || target < 1) {
        setStatus("Choose a target count");
        return;
      }

      // Resume if paused mid-session
      if (paused && current > 0){
        paused = false;
        setStatus("Counting…");
        await requestWakeLock();
        timer = setTimeout(tick, 0);
        return;
      }

      // Fresh start
      reset(false); // keep UI, just reset internal state
      await countdown3BeepPlus1s();
      await cueGo();

      setStatus("Counting…");
      await requestWakeLock();
      timer = setTimeout(tick, 0);

    } catch (e){
      console.error(e);
      setStatus("Couldn’t start (audio not allowed yet). Tap Start again.");
    }
  }

  function pause(){
    if (inCountdown) return; // keep it simple; you can change if you want
    paused = true;
    clearTimer();
    releaseWakeLock();
    setStatus("Paused");
  }

  function reset(updateStatus=true){
    paused = false;
    inCountdown = false;
    current = 0;
    clearTimer();
    releaseWakeLock();
    if (updateStatus) setStatus("Ready");
  }

  // --- UI bindings ---
  elTarget.addEventListener("change", () => {
    reset();
  });

  elSpeed.addEventListener("input", () => {
    elSpeedVal.textContent = Number(elSpeed.value).toFixed(2) + "×";
  });

  elCountVol.addEventListener("input", () => {
    const v = Number(elCountVol.value);
    elCountVolVal.textContent = v.toFixed(2);
    if (beepGain) beepGain.gain.value = v;
  });

  startBtn.addEventListener("click", start);
  pauseBtn.addEventListener("click", pause);
  resetBtn.addEventListener("click", () => reset(true));

  // Init labels
  elSpeedVal.textContent = Number(elSpeed.value).toFixed(2) + "×";
  elCountVolVal.textContent = Number(elCountVol.value).toFixed(2);
  setStatus("Ready");
})();
</script>
</body>
</html>
