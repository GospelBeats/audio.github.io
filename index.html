<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Workout Counter</title>
<style>
  :root{--primary:#2563eb;--danger:#dc2626;--gray:#6b7280;--bg:#f3f4f6;}
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;}
  body{margin:0;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .wrap{width:100%;max-width:440px;}
  .card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.10);}
  h1{margin:0 0 14px;text-align:center;font-size:22px;}
  label{display:block;margin:14px 0 6px;font-size:13px;color:#111827;}
  select,input[type="range"]{width:100%;border:0;border-radius:14px;background:#f1f5f9;padding:12px;font-size:16px;}
  input[type="range"]{padding:14px 10px;}
  .value{margin-top:6px;font-size:13px;color:#374151;text-align:right;}
  .status{margin-top:14px;text-align:center;color:#6b7280;font-size:14px;min-height:18px;}
  .btnRow{display:flex;gap:10px;margin-top:14px;}
  button{flex:1;border:0;border-radius:14px;padding:14px;font-size:18px;font-weight:700;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
  .start{background:var(--primary);color:#fff;}
  .pause{background:var(--gray);color:#fff;}
  .reset{background:var(--danger);color:#fff;}
  .hint{margin-top:12px;font-size:12px;color:#6b7280;line-height:1.35;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Workout Counter</h1>

      <label>Target count</label>
      <select id="target">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="75" selected>75</option>
        <option value="100">100</option>
      </select>

      <label>Counting speed</label>
      <input type="range" id="speed" min="0.6" max="1.6" step="0.05" value="1.0" />
      <div class="value" id="speedVal">1.00×</div>

      <label>Counting audio volume</label>
      <input type="range" id="countVol" min="0" max="1" step="0.01" value="1" />
      <div class="value" id="countVolVal">1.00</div>

      <div class="status" id="status">Ready</div>

      <div class="btnRow">
        <button class="start" id="startBtn">Start</button>
        <button class="pause" id="pauseBtn">Pause</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>

      <div class="hint">
        Start Apple Music/Spotify first, then tap <b>Start</b>. This app uses recorded counting audio (no speech synthesis).
      </div>
    </div>
  </div>

<script>
(() => {
  // Put these MP3s in the SAME GitHub Pages folder as index.html
  const AUDIO = {
    25: "counting_25.mp3",
    50: "counting_50.mp3",
    75: "counting_75.mp3",
    100:"counting_100.mp3",
  };

  const elTarget   = document.getElementById("target");
  const elSpeed    = document.getElementById("speed");
  const elSpeedVal = document.getElementById("speedVal");
  const elCountVol = document.getElementById("countVol");
  const elCountVolVal = document.getElementById("countVolVal");
  const elStatus   = document.getElementById("status");
  const startBtn   = document.getElementById("startBtn");
  const pauseBtn   = document.getElementById("pauseBtn");
  const resetBtn   = document.getElementById("resetBtn");

  const setStatus = (t) => elStatus.textContent = t;

  // WebAudio (best shot at mixing with background music on mobile)
  let ctx = null;
  let gain = null;

  let buffer = null;
  let source = null;
  let startedAt = 0; // ctx time when play started
  let pausedAt = 0;  // offset into buffer (seconds)
  let loadedForTarget = null;

  // wake lock (optional)
  let wakeLock = null;

  function ensureCtx(){
    if (!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      gain = ctx.createGain();
      gain.gain.value = Number(elCountVol.value);
      gain.connect(ctx.destination);
    }
    if (ctx.state === "suspended") return ctx.resume();
    return Promise.resolve();
  }

  async function requestWakeLock(){
    try{
      if ("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
      }
    }catch(e){}
  }
  async function releaseWakeLock(){
    try{ if (wakeLock) await wakeLock.release(); }catch(e){}
    wakeLock = null;
  }

  function stopSource(){
    if (source){
      try { source.stop(0); } catch(e) {}
      try { source.disconnect(); } catch(e) {}
      source = null;
    }
  }

  function playbackRate(){
    return Number(elSpeed.value);
  }

  function currentOffset(){
    if (!ctx || !buffer) return 0;
    // wallclock delta * rate gives buffer seconds elapsed
    const t = (ctx.currentTime - startedAt) * playbackRate();
    return Math.max(0, Math.min(t, buffer.duration));
  }

  function playFrom(offsetSec){
    stopSource();
    source = ctx.createBufferSource();
    source.buffer = buffer;
    source.playbackRate.value = playbackRate();
    source.connect(gain);

    startedAt = ctx.currentTime - offsetSec;
    source.start(0, offsetSec);

    source.onended = () => {
      if (source){ // natural end
        source = null;
        pausedAt = 0;
        releaseWakeLock();
        setStatus("Done ✅");
      }
    };
  }

  async function loadBufferForSelectedTarget(){
    await ensureCtx();
    const t = Number(elTarget.value);
    if (loadedForTarget === t && buffer) return;

    setStatus("Loading audio…");
    const url = AUDIO[t];

    const res = await fetch(url, { cache: "no-cache" });
    if (!res.ok) throw new Error("Fetch failed: " + res.status);

    const ab = await res.arrayBuffer();
    buffer = await ctx.decodeAudioData(ab);
    loadedForTarget = t;
    pausedAt = 0;
    setStatus("Ready");
  }

  // Beep countdown: 3 beeps (1s apart) + extra 1 second pause
  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  async function beepOnce(durationMs=140, freq=880){
    await ensureCtx();
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.25, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durationMs/1000);

    osc.connect(g).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + durationMs/1000);

    await new Promise(r => osc.onended = r);
  }

  async function countdown3BeepPlus1s(){
    setStatus("Get ready…");
    for (let i=0;i<3;i++){
      await beepOnce(140, 880);
      await wait(860); // total ~1s spacing
    }
    setStatus("…");
    await wait(1000); // extra 1 second pause after beeps
  }

  async function start(){
    try{
      await ensureCtx();
      await loadBufferForSelectedTarget();

      // Resume if paused
      if (pausedAt > 0){
        setStatus("Counting…");
        await requestWakeLock();
        playFrom(pausedAt);
        return;
      }

      // Fresh start
      stopSource();
      pausedAt = 0;

      await countdown3BeepPlus1s();

      setStatus("Counting…");
      await requestWakeLock();
      playFrom(0);

    }catch(e){
      console.error(e);
      setStatus("Couldn’t start. Check MP3 paths.");
    }
  }

  function pause(){
    if (!ctx || !buffer || !source) return;
    pausedAt = currentOffset();
    stopSource();
    releaseWakeLock();
    setStatus("Paused");
  }

  function reset(){
    stopSource();
    pausedAt = 0;
    releaseWakeLock();
    setStatus("Ready");
  }

  // UI bindings
  elSpeed.addEventListener("input", () => {
    elSpeedVal.textContent = playbackRate().toFixed(2) + "×";
    if (source) source.playbackRate.value = playbackRate();
  });

  elCountVol.addEventListener("input", () => {
    const v = Number(elCountVol.value);
    elCountVolVal.textContent = v.toFixed(2);
    if (gain) gain.gain.value = v;
  });

  elTarget.addEventListener("change", async () => {
    reset();
    try { await loadBufferForSelectedTarget(); }
    catch(e){ console.error(e); setStatus("Couldn’t load audio."); }
  });

  startBtn.addEventListener("click", start);
  pauseBtn.addEventListener("click", pause);
  resetBtn.addEventListener("click", reset);

  // init text
  elSpeedVal.textContent = playbackRate().toFixed(2) + "×";
  elCountVolVal.textContent = Number(elCountVol.value).toFixed(2);

  // optional preload
  loadBufferForSelectedTarget().catch(() => setStatus("Ready (loads on Start)"));
})();
</script>
</body>
</html>
